<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breeze Coffee</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #333;
    }
    header {
      background-color: #eacba3;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 40px;
    }
    header nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
      background: #d6b98c;
      padding: 8px 12px;
      border-radius: 4px;
    }
    header h1 {
      font-family: serif;
      font-size: 24px;
      display: flex;
      align-items: center;
    }
    header h1:before, header h1:after {
      content: "☕";
      margin: 0 8px;
    }
    .hero {
      background: url('https://images.unsplash.com/photo-1528892952291-009c663ce843?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwzNjUyOXwwfDF8c2VhcmNofDJ8fGNvZmZlZSUyMGRlc2t8ZW58MHx8fHwxNjUyMDc4NzM4&ixlib=rb-1.2.1&q=80&w=1080') no-repeat center/cover;
      height: 250px;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .hero h2 {
      font-size: 36px;
      margin: 0;
    }
    .hero p {
      margin: 5px 0;
      font-size: 16px;
    }
    .section {
      padding: 40px;
    }
    .section h3 {
      font-size: 24px;
    }
    .location {
      text-align: center;
      font-size: 20px;
      margin-bottom: 20px;
    }
    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
    }
    .feature {
      max-width: 300px;
      text-align: center;
    }
    .feature img {
      max-width: 100%;
      border-radius: 8px;
    }
    .social {
      text-align: center;
      margin: 20px 0;
    }
    .social a {
      margin: 0 10px;
      font-size: 24px;
      text-decoration: none;
      color: #333;
    }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="#">Our Coffee</a>
    <a href="#">Reviews</a>
  </nav>
  <h1>COFFEE</h1>
  <nav>
    <a href="#">Contact</a>
    <a href="#">About Us</a>
  </nav>
</header>

<div class="hero">
  <h2>Breeze Coffee</h2>
  <p>Est. 1995</p>
</div>

<div class="section">
  <div class="location">
    <h3>The best of London</h3>
    <p>Located on 43 Floral Street</p>
  </div>
  
  <div class="social">
    <a href="#"><span>📘</span></a>
    <a href="#"><span>🐦</span></a>
    <a href="#"><span>📸</span></a>
    <p>@BreezeCoffee</p>
  </div>
  
  <div class="features">
    <div class="feature">
      <img src="https://images.unsplash.com/photo-1507133750040-4a8f57021571?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwzNjUyOXwwfDF8c2VhcmNofDV8fGNvZmZlZSUyMHNob3B8ZW58MHx8fHwxNjUyMDc4ODI2&ixlib=rb-1.2.1&q=80&w=1080" alt="Comfort and Simplicity">
      <p>Comfort and Simplicity</p>
    </div>
    <div class="feature">
      <img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwzNjUyOXwwfDF8c2VhcmNofDE3fHxjb2ZmZWUlMjBiZWFuc3xlbnwwfHx8fDE2NTIwNzg5NTk&ixlib=rb-1.2.1&q=80&w=1080" alt="100% Pure and Delicious">
      <p>100% Pure and Delicious</p>
    </div>
  </div>
</div>

</body>
</html>
